<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>食光 · DIY自制菜谱</title>
<style>
:root {
  --primary: #FF6B35;
  --primary-light: #FF8C5A;
  --primary-dark: #E55A2B;
  --secondary: #2EC4B6;
  --bg: #FFF9F5;
  --bg-gray: #F5F0EB;
  --bg-white: #FFFFFF;
  --text: #2D2D2D;
  --text-secondary: #8B8B8B;
  --text-light: #B0B0B0;
  --border: #F0EBE3;
  --border-active: #FFD4C0;
  --danger: #E74C3C;
  --success: #27AE60;
  --warning: #F39C12;
  --star: #FFB800;
  --radius-xl: 20px;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 8px;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-xl: 0 8px 32px rgba(0,0,0,0.14);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:#E8E4DF;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:12px;
}

.app-phone{
  width:390px;
  max-width:100vw;
  height:844px;
  max-height:100vh;
  background:var(--bg);
  border-radius:var(--radius-xl);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.18), 0 0 0 2px #222;
}

/* ========== STATUS BAR ========== */
.status-bar{
  height:44px;background:var(--bg-white);display:flex;
  align-items:center;justify-content:space-between;
  padding:0 20px;font-size:12px;font-weight:600;
  color:var(--text);flex-shrink:0;
}
.status-bar .time{font-size:13px}
.status-icons{display:flex;gap:6px;align-items:center;font-size:11px}

/* ========== HEADER ========== */
.header{
  height:44px;background:var(--bg-white);
  display:flex;align-items:center;justify-content:center;
  padding:0 16px;position:relative;flex-shrink:0;
  border-bottom:1px solid transparent;
  transition:border-color .2s;
}
.header.scrolled{border-bottom-color:var(--border)}
.header-back{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;width:34px;height:34px;border-radius:50%;
  font-size:18px;color:var(--text);cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:background .2s;
}
.header-back.show{display:flex}
.header-back:active{background:var(--bg-gray)}
.header-title{font-size:17px;font-weight:600;color:var(--text);letter-spacing:.3px}
.header-action{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;font-size:14px;color:var(--primary);
  cursor:pointer;font-weight:500;padding:6px 10px;border-radius:16px;
  transition:background .2s;
}
.header-action:active{background:#FFF0E8}

/* ========== MAIN CONTENT ========== */
.main-content{
  flex:1;display:flex;overflow:hidden;
  position:relative;
}

/* ---- LEFT: Category Sidebar ---- */
.cat-sidebar{
  width:84px;flex-shrink:0;background:var(--bg-white);
  border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
}
.cat-sidebar::-webkit-scrollbar{width:0}
.cat-list{flex:1;padding:6px 0}
.cat-item{
  padding:13px 6px 13px 10px;text-align:center;font-size:13px;
  color:var(--text-secondary);cursor:pointer;
  border-left:3px solid transparent;position:relative;
  transition:all .18s;user-select:none;word-break:break-all;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.cat-item:hover{background:#FFFBF8}
.cat-item:active{background:#FFF5F0}
.cat-item.active{color:var(--primary);border-left-color:var(--primary);font-weight:600;background:linear-gradient(90deg,#FFF5F0 0%,#FFF9F5 100%)}
.cat-item .cat-count{
  font-size:10px;color:var(--text-light);font-weight:400;
  background:var(--bg-gray);padding:1px 8px;border-radius:8px;
  min-width:24px;text-align:center;
}
.cat-item.active .cat-count{background:#FFE8D6;color:var(--primary)}

/* Category context menu trigger */
.cat-item .cat-more{
  position:absolute;top:4px;right:2px;width:20px;height:20px;
  border-radius:50%;display:none;align-items:center;
  justify-content:center;font-size:12px;color:var(--text-light);
  cursor:pointer;
}
.cat-item:hover .cat-more,.cat-item.active .cat-more{display:flex}
.cat-item .cat-more:active{background:var(--border)}

.cat-footer{
  padding:8px;border-top:1px solid var(--border);
}
.cat-footer-btn{
  width:100%;padding:8px;text-align:center;font-size:12px;
  color:var(--text-secondary);cursor:pointer;
  border:1.5px dashed var(--border);border-radius:var(--radius-xs);
  transition:all .2s;
  background:none;
}
.cat-footer-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ---- RIGHT: Recipe Content ---- */
.recipe-content{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
}

.recipe-top-bar{
  padding:10px 12px;display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-shrink:0;
}
.recipe-top-bar .section-label{
  font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;
}
.recipe-top-bar .section-sublabel{
  font-size:11px;color:var(--text-light);margin-left:4px;
}
.top-bar-actions{display:flex;gap:8px;align-items:center}

.btn{
  padding:8px 14px;border-radius:20px;border:none;font-size:13px;
  font-weight:600;cursor:pointer;display:inline-flex;align-items:center;
  gap:5px;transition:all .18s;white-space:nowrap;outline:none;
  font-family:inherit;letter-spacing:.2px;
}
.btn:active{transform:scale(.96)}
.btn-primary{
  background:var(--primary);color:white;
  box-shadow:0 2px 8px rgba(255,107,53,0.3);
}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{
  background:var(--bg-white);color:var(--text-secondary);
  border:1.5px solid var(--border);
}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost{
  background:transparent;color:var(--text-secondary);
  padding:6px 10px;
}
.btn-ghost:hover{background:var(--bg-gray)}
.btn-danger{color:var(--danger);border-color:var(--danger)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:12px}

/* Recipe Grid */
.recipe-grid{
  flex:1;overflow-y:auto;padding:8px 10px 16px;
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  align-content:start;
}
.recipe-grid::-webkit-scrollbar{width:0}

.recipe-card{
  background:var(--bg-white);border-radius:var(--radius-sm);
  overflow:hidden;cursor:pointer;position:relative;
  box-shadow:var(--shadow-sm);transition:all .2s;
  animation:fadeUp .35s ease backwards;
}
.recipe-card:nth-child(1){animation-delay:0s}
.recipe-card:nth-child(2){animation-delay:.05s}
.recipe-card:nth-child(3){animation-delay:.1s}
.recipe-card:nth-child(4){animation-delay:.15s}
.recipe-card:nth-child(5){animation-delay:.2s}
.recipe-card:nth-child(6){animation-delay:.25s}

.recipe-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.recipe-card:active{transform:scale(.98)}
.recipe-card.selected{outline:2.5px solid var(--primary);outline-offset:-2px;border-radius:var(--radius-sm)}

.recipe-card-img{
  width:100%;height:105px;object-fit:cover;
  background:linear-gradient(135deg,#FFE8D6 0%,#FFD4C0 50%,#FFC8A8 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:44px;position:relative;
}
.recipe-card-img .cover-overlay{
  position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(transparent,rgba(0,0,0,0.15));
}

.recipe-card-badge{
  position:absolute;top:8px;left:8px;
  background:rgba(0,0,0,0.55);color:white;font-size:10px;
  padding:2px 8px;border-radius:10px;font-weight:500;
  backdrop-filter:blur(4px);
}
.recipe-card-more{
  position:absolute;top:6px;right:6px;width:26px;height:26px;
  background:rgba(255,255,255,0.85);border-radius:50%;border:none;
  font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);backdrop-filter:blur(4px);
  transition:all .15s;z-index:2;
}
.recipe-card-more:hover{background:white;color:var(--text)}
.recipe-card-body{padding:10px 10px 8px}
.recipe-card-name{
  font-size:14px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:4px;line-height:1.3;
}
.recipe-card-footer{
  display:flex;align-items:center;justify-content:space-between;
}
.recipe-card-price{font-size:16px;font-weight:800;color:var(--primary);letter-spacing:-.5px}
.recipe-card-price::before{content:'¥';font-size:11px;font-weight:600;margin-right:1px}
.recipe-card-cat{
  font-size:10px;color:var(--text-light);background:var(--bg-gray);
  padding:2px 8px;border-radius:8px;max-width:60px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Context Action Sheet (Card Long-press / More) */
.action-sheet-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0.45);
  z-index:90;display:none;justify-content:center;align-items:flex-end;
  animation:fadeIn .2s ease;
}
.action-sheet-overlay.show{display:flex}
.action-sheet{
  background:var(--bg-white);width:100%;border-radius:16px 16px 0 0;
  padding:0;animation:slideUp .25s ease;max-width:390px;
  box-shadow:var(--shadow-xl);
}
.action-sheet-handle{
  width:36px;height:4px;background:#DDD;border-radius:2px;
  margin:10px auto 6px;
}
.action-sheet-item{
  display:flex;align-items:center;gap:12px;padding:14px 20px;
  font-size:15px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--border);color:var(--text);
}
.action-sheet-item:last-child{border-bottom:none}
.action-sheet-item:active{background:var(--bg-gray)}
.action-sheet-item .as-icon{font-size:20px;width:28px;text-align:center}
.action-sheet-item.danger{color:var(--danger)}
.action-sheet-cancel{
  text-align:center;padding:14px;font-size:15px;color:var(--text-secondary);
  cursor:pointer;font-weight:500;border-top:6px solid var(--bg-gray);
}
.action-sheet-cancel:active{background:var(--bg-gray)}

/* Empty State */
.empty-state{
  flex:1;display:none;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 30px;gap:14px;text-align:center;
}
.empty-state.show{display:flex}
.empty-state-illustration{
  width:120px;height:120px;border-radius:50%;background:var(--bg-gray);
  display:flex;align-items:center;justify-content:center;font-size:56px;
  opacity:.7;margin-bottom:4px;
}
.empty-state-title{
  font-size:16px;font-weight:600;color:var(--text-secondary);
}
.empty-state-desc{
  font-size:13px;color:var(--text-light);line-height:1.6;
}
.empty-state .btn{margin-top:8px}

/* Select Mode Bar */
.select-bar{
  display:none;padding:10px 14px;background:#FFF5F0;align-items:center;
  justify-content:space-between;border-top:1px solid var(--border-active);
  flex-shrink:0;
}
.select-bar.show{display:flex}
.select-bar .count{font-size:13px;color:var(--primary);font-weight:600}
.select-bar-actions{display:flex;gap:8px}

/* ========== SUB-PAGE: Recipe Detail ========== */
.sub-page{
  position:absolute;inset:0;background:var(--bg);z-index:20;
  display:none;flex-direction:column;overflow:hidden;
}
.sub-page.show{display:flex}
.sub-page-content{
  flex:1;overflow-y:auto;padding:0 16px 100px;
}
.sub-page-content::-webkit-scrollbar{width:0}

.detail-hero{
  margin:0 -16px;height:220px;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#FFE8D6,#FFD0B0,#FFC4A0);
}
.detail-hero-emoji{font-size:80px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.12))}
.detail-hero-gradient{
  position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(transparent,var(--bg));
}

.detail-header{margin-top:-20px;position:relative;z-index:1}
.detail-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.detail-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.detail-price{font-size:24px;font-weight:800;color:var(--primary)}
.detail-price::before{content:'¥';font-size:14px;margin-right:2px}
.detail-tag{
  font-size:12px;padding:4px 12px;border-radius:12px;
  background:var(--bg-gray);color:var(--text-secondary);
}

.detail-section{margin-bottom:20px}
.detail-section-title{
  font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}

.ingredient-list{
  background:var(--bg-white);border-radius:var(--radius-sm);
  padding:6px 0;box-shadow:var(--shadow-sm);
}
.ingredient-row{
  display:flex;justify-content:space-between;padding:11px 14px;
  border-bottom:1px solid var(--border);font-size:14px;
}
.ingredient-row:last-child{border-bottom:none}
.ingredient-row .ing-name{color:var(--text);font-weight:500}
.ingredient-row .ing-amount{color:var(--text-secondary)}

.step-item{
  display:flex;gap:12px;margin-bottom:0;
}
.step-connector{
  display:flex;flex-direction:column;align-items:center;
  flex-shrink:0;width:28px;
}
.step-num{
  width:28px;height:28px;border-radius:50%;background:var(--primary);
  color:white;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.step-line{
  width:2px;flex:1;background:var(--border-active);margin:4px 0;min-height:16px;
}
.step-item:last-child .step-line{display:none}
.step-body{
  flex:1;padding-bottom:16px;
  background:var(--bg-white);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.step-body p{font-size:14px;line-height:1.7;color:var(--text)}
.step-body .step-img-placeholder{
  margin-top:10px;border-radius:var(--radius-xs);overflow:hidden;
  background:var(--bg-gray);height:120px;display:flex;
  align-items:center;justify-content:center;font-size:32px;
  color:var(--text-light);
}

.detail-bottom-bar{
  position:absolute;bottom:0;left:0;right:0;padding:12px 16px;
  background:var(--bg-white);border-top:1px solid var(--border);
  display:flex;gap:10px;z-index:5;
}
.detail-bottom-bar .btn{flex:1;justify-content:center}
.detail-bottom-bar .btn-primary{flex:2}

.ref-link-box{
  font-size:12px;color:var(--primary);background:#FFF5F0;
  padding:8px 12px;border-radius:var(--radius-xs);
  display:flex;align-items:center;gap:6px;word-break:break-all;
}

/* ========== SUB-PAGE: Create/Edit Recipe ========== */
.create-page{
  position:absolute;inset:0;background:var(--bg);z-index:20;
  display:none;flex-direction:column;overflow:hidden;
}
.create-page.show{display:flex}

.create-header{
  height:44px;background:var(--bg-white);display:flex;
  align-items:center;justify-content:space-between;
  padding:0 12px;flex-shrink:0;border-bottom:1px solid var(--border);
}
.create-header .close-btn{
  background:none;border:none;font-size:15px;color:var(--text-secondary);
  cursor:pointer;padding:8px;border-radius:16px;
}
.create-header .close-btn:active{background:var(--bg-gray)}
.create-header .create-title{font-size:16px;font-weight:600}
.create-header .draft-btn{
  background:none;border:none;font-size:13px;color:var(--primary);
  cursor:pointer;padding:6px 12px;border-radius:16px;font-weight:500;
}
.create-header .draft-btn:active{background:#FFF0E8}

/* Step progress */
.create-progress{
  display:flex;align-items:center;justify-content:center;
  padding:14px 30px;background:var(--bg);gap:0;flex-shrink:0;
}
.progress-step{
  display:flex;align-items:center;gap:0;
}
.progress-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;transition:all .35s;
  background:var(--border);color:var(--text-light);
}
.progress-dot.done{background:var(--secondary);color:white}
.progress-dot.active{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(255,107,53,0.4)}
.progress-line{
  width:36px;height:2px;background:var(--border);transition:background .35s;
  margin:0 2px;
}
.progress-line.done{background:var(--secondary)}
.progress-label{
  text-align:center;font-size:10px;color:var(--text-light);
  margin-top:4px;transition:color .35s;
}
.progress-label.active{color:var(--primary);font-weight:600}

.create-body{
  flex:1;overflow-y:auto;padding:0 16px 20px;
}
.create-body::-webkit-scrollbar{width:0}

.create-bottom-bar{
  padding:12px 16px;background:var(--bg-white);
  border-top:1px solid var(--border);
  display:flex;gap:10px;flex-shrink:0;
}
.create-bottom-bar .btn{flex:1;justify-content:center}

/* Form elements */
.form-group{margin-bottom:16px}
.form-label{
  font-size:13px;font-weight:600;color:var(--text);
  margin-bottom:6px;display:flex;align-items:center;gap:4px;
}
.form-label .required{color:var(--primary);font-size:14px}
.form-label .optional{color:var(--text-light);font-size:11px;font-weight:400}
.form-input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:var(--radius-xs);font-size:14px;outline:none;
  transition:all .2s;background:var(--bg-white);font-family:inherit;
  color:var(--text);
}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,0.08)}
.form-input::placeholder{color:var(--text-light)}
textarea.form-input{resize:vertical;min-height:80px;line-height:1.6}

/* Category picker */
.cat-chip-group{display:flex;flex-wrap:wrap;gap:8px}
.cat-chip{
  padding:7px 15px;border-radius:18px;font-size:13px;cursor:pointer;
  border:1.5px solid var(--border);background:var(--bg-white);
  color:var(--text-secondary);transition:all .18s;user-select:none;
  font-weight:500;
}
.cat-chip:active{transform:scale(.95)}
.cat-chip.selected{background:var(--primary);color:white;border-color:var(--primary);font-weight:600}

/* Tag input */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag-item{
  padding:5px 12px;border-radius:14px;background:#FFF0E8;
  color:var(--primary);font-size:12px;font-weight:500;
  display:flex;align-items:center;gap:4px;
  animation:popIn .2s ease;
}
.tag-item .tag-remove{
  cursor:pointer;font-size:14px;line-height:1;opacity:.6;transition:opacity .15s;
}
.tag-item .tag-remove:hover{opacity:1}
.tag-input-inline{
  border:1.5px dashed var(--border);padding:5px 12px;border-radius:14px;
  font-size:12px;outline:none;width:100px;transition:all .2s;
  background:transparent;font-family:inherit;
}
.tag-input-inline:focus{border-color:var(--primary);width:130px}

/* Ingredient block */
.ingredient-block{
  background:var(--bg-white);border-radius:var(--radius-sm);
  padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);
  position:relative;
}
.ingredient-block .ing-category-label{
  font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:10px;
}
.ing-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ing-row:last-child{margin-bottom:0}
.ing-row input{flex:1;padding:8px 10px;font-size:13px}
.ing-row input:first-child{flex:2}
.ing-row .remove-btn{
  width:28px;height:28px;border-radius:50%;border:none;
  background:var(--bg-gray);cursor:pointer;font-size:14px;
  color:var(--text-light);display:flex;align-items:center;
  justify-content:center;transition:all .15s;
}
.ing-row .remove-btn:hover{background:#FFE0E0;color:var(--danger)}
.add-ing-btn{
  font-size:12px;color:var(--primary);cursor:pointer;
  background:none;border:none;padding:6px 0;font-weight:500;
  display:flex;align-items:center;gap:4px;
}

/* Step card in editor */
.step-editor-card{
  background:var(--bg-white);border-radius:var(--radius-sm);
  padding:14px;margin-bottom:12px;box-shadow:var(--shadow-sm);
  position:relative;
}
.step-editor-card .step-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.step-editor-card .step-label{
  font-size:12px;font-weight:700;color:var(--primary);

}
.step-editor-card .step-label .num{
  width:24px;height:24px;border-radius:50%;background:var(--primary);
  color:white;display:flex;align-items:center;justify-content:center;
  font-size:11px;
}
.step-editor-card textarea{min-height:80px;font-size:13px}
.step-editor-card .char-count{
  text-align:right;font-size:11px;color:var(--text-light);margin-top:4px;
}
.step-img-upload{
  margin-top:10px;height:100px;border-radius:var(--radius-xs);
  border:1.5px dashed var(--border);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;
  background:var(--bg-gray);font-size:13px;color:var(--text-light);
  gap:6px;overflow:hidden;position:relative;
}
.step-img-upload:hover{border-color:var(--primary)}
.step-img-upload.has-img{border-style:solid;padding:0}
.step-img-upload.has-img img{width:100%;height:100%;object-fit:cover}
.step-img-upload .replace-hint{
  position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,0.6);
  color:white;font-size:10px;padding:2px 8px;border-radius:8px;
}

/* Cover picker */
.cover-picker-area{
  width:100%;height:180px;border-radius:var(--radius);
  border:2px dashed var(--border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;background:var(--bg-white);gap:10px;
  overflow:hidden;position:relative;
}
.cover-picker-area:hover{border-color:var(--primary)}
.cover-picker-area.has-cover{border-style:solid;padding:0}
.cover-picker-area.has-cover img{width:100%;height:100%;object-fit:cover}
.cover-picker-icon{font-size:44px}
.cover-picker-text{font-size:13px;color:var(--text-light)}
.cover-picker-sub{
  font-size:11px;color:var(--text-light);
  display:flex;gap:12px;
}

/* Permission dialog */
.permission-dialog{
  background:var(--bg-white);border-radius:var(--radius);padding:20px;
  text-align:center;margin:12px 0;box-shadow:var(--shadow-sm);
}
.permission-dialog .perm-icon{font-size:40px;margin-bottom:8px}
.permission-dialog .perm-title{font-size:15px;font-weight:600;margin-bottom:4px}
.permission-dialog .perm-desc{font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5}
.permission-dialog .perm-actions{display:flex;gap:8px;justify-content:center}

/* Step summary in save page */
.summary-card{
  background:var(--bg-white);border-radius:var(--radius-sm);
  padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);
}
.summary-card .sum-title{font-size:14px;font-weight:600;margin-bottom:6px}
.summary-card .sum-detail{font-size:13px;color:var(--text-secondary);line-height:1.6}
.summary-card .sum-warning{
  font-size:11px;color:var(--warning);margin-top:6px;
  display:flex;align-items:center;gap:4px;
}

/* Toast */
.toast-container{
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  z-index:200;pointer-events:none;
}
.toast{
  background:rgba(44,44,44,0.92);color:white;padding:10px 20px;
  border-radius:20px;font-size:13px;font-weight:500;
  transition:all .35s ease;opacity:0;transform:translateY(-10px);
  backdrop-filter:blur(8px);white-space:nowrap;text-align:center;
}
.toast.show{opacity:1;transform:translateY(0)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Drag ghost */
.cat-item.dragging{opacity:0.5;background:var(--border-active)}
.cat-item.drag-over{border-top:2px solid var(--primary)}

/* Export format modal */
.format-grid{

// ===================== RENDER: Main Layout =====================
function renderAll(){
  renderSidebar();
  renderRecipes();
  updateRecipeCount();
}

function renderSidebar(){
  const list = document.getElementById('catList');
  const total = state.recipes.length;
  list.innerHTML = [
    // "All" option
    `<div class="cat-item ${state.selectedCat === null ? 'active' : ''}" onclick="selectCategory(null)">
      全部<span class="cat-count">${total}</span>
    </div>`,
    // Category items
    ...state.categories.map(c => {
      const count = state.recipes.filter(r => r.category === c).length;
      return `<div class="cat-item ${state.selectedCat === c ? 'active' : ''}" onclick="selectCategory('${c}')">
        ${c}<span class="cat-count">${count}</span>
      </div>`;
    })
  ].join('');
}

function selectCategory(cat){
  state.selectedCat = cat;
  renderSidebar();
  renderRecipes();
}

function updateRecipeCount(){
  const filtered = getFilteredRecipes();
  document.getElementById('recipeCount').textContent = `· ${filtered.length}道`;
}

function getFilteredRecipes(){
  if(state.selectedCat === null) return state.recipes;
  return state.recipes.filter(r => r.category === state.selectedCat);
}

function renderRecipes(){
  const grid = document.getElementById('recipeGrid');
  const empty = document.getElementById('emptyState');
  const list = getFilteredRecipes();

  if(list.length === 0){
    grid.innerHTML = '';
    empty.classList.add('show');
  } else {
    empty.classList.remove('show');
    grid.innerHTML = list.map(r => {
      const selected = state.selectMode && state.selectedIds.has(r.id);
      return `
        <div class="recipe-card ${selected ? 'selected' : ''}" id="card-${r.id}"
             onclick="${state.selectMode ? `toggleSelect(${r.id})` : `openDetail(${r.id})`}">
          <div class="recipe-card-img">${r.coverEmoji || CATEGORY_EMOJI[r.category] || '🍽️'}<div class="cover-overlay"></div></div>
          ${r.tags && r.tags[0] ? `<div class="recipe-card-badge">${r.tags[0]}</div>` : ''}
          <button class="recipe-card-more" onclick="event.stopPropagation();showRecipeActionSheet(${r.id})">⋯</button>
          <div class="recipe-card-body">
            <div class="recipe-card-name" title="${r.name}">${r.name}</div>
            <div class="recipe-card-footer">
              <span class="recipe-card-price">${r.price}</span>
              <span class="recipe-card-cat">${r.category}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }
}

// ===================== SELECT MODE =====================
function toggleSelectMode(){
  state.selectMode = !state.selectMode;
  state.selectedIds.clear();
  document.getElementById('btnSelectToggle').textContent = state.selectMode ? '☑ 取消' : '☐ 多选';
  document.getElementById('selectBar').classList.toggle('show', state.selectMode);
  renderRecipes();
}

function cancelSelectMode(){
  state.selectMode = false;
  state.selectedIds.clear();
  document.getElementById('btnSelectToggle').textContent = '☐ 多选';
  document.getElementById('selectBar').classList.remove('show');
  renderRecipes();
}

function toggleSelect(id){
  if(state.selectedIds.has(id)) state.selectedIds.delete(id);
  else state.selectedIds.add(id);
  document.getElementById('selectCount').textContent = `已选 ${state.selectedIds.size} 项`;
  renderRecipes();
}

function batchImportShoppingList(){
  if(state.selectedIds.size === 0) return toast('请先勾选菜谱');
  const names = [];
  const allIngredients = new Map();
  state.selectedIds.forEach(id => {
    const r = state.recipes.find(r => r.id === id);
    if(!r) return;
    names.push(r.name);
    if(r.ingredients){
      r.ingredients.forEach(ingGroup => {
        (ingGroup.items || []).forEach(item => {
          if(item.name){
            const key = item.name;
            if(allIngredients.has(key)){
              allIngredients.set(key, allIngredients.get(key) + '、' + item.amount);
            } else {
              allIngredients.set(key, item.amount);
            }
          }
        });
      });
    }
  });
  const listText = Array.from(allIngredients.entries()).map(([n,a]) => `• ${n} ${a}`).join('\n');
  toast(`已导入采购清单：${names.join('、')}\n共 ${allIngredients.size} 种食材`);
  console.log('📋 采购清单：\n' + listText);
  cancelSelectMode();
}

// ===================== RECIPE ACTION SHEET =====================
function showRecipeActionSheet(id){
  const r = state.recipes.find(r => r.id === id);
  if(!r) return;
  const sheet = document.getElementById('actionSheetContent');
  sheet.innerHTML = `
    <div class="action-sheet-handle"></div>
    <div style="text-align:center;padding:10px;font-size:14px;font-weight:600;color:var(--text)">${r.name}</div>

    </div>

function closeActionSheet(e){
  if(e && e.target !== document.getElementById('actionSheet')) return;
  document.getElementById('actionSheet').classList.remove('show');
}

function deleteRecipe(id){
  if(!confirm('确定删除该菜谱吗？此操作不可撤销。')) return;
  state.recipes = state.recipes.filter(r => r.id !== id);
  if(state.currentDetailId === id) goBack();
  renderAll();
  toast('菜谱已删除');
}

function shelfToRestaurant(id){
  const r = state.recipes.find(r => r.id === id);
  if(!r) return;
  toast(`✅「${r.name}」已上架到你的餐厅`);
}

function exportRecipe(format){

      <div class="detail-section-title">🥘 食材清单</div>
      <div class="ingredient-list">${ingredientsHTML || '<div style="padding:16px;text-align:center;color:var(--text-light);font-size:13px">暂无食材信息</div>'}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">👨‍🍳 烹饪步骤 <span style="font-weight:400;font-size:12px;color:var(--text-light)">共 ${(r.steps||[]).length} 步</span></div>
      ${stepsHTML || '<div style="padding:16px;text-align:center;color:var(--text-light);font-size:13px">暂无步骤信息</div>'}

function editCurrentRecipe(){
  if(state.currentDetailId) openCreateRecipe(state.currentDetailId);
}

// ===================== CREATE / EDIT RECIPE =====================
function openCreateRecipe(editId){
  state.currentView = 'create';
  state.isEditing = !!editId;
  state.editingId = editId || null;
  state.createStep = 0;
  state.stepImgInputs = {};

  if(editId){
    const r = state.recipes.find(r => r.id === editId);
    if(r){
      state.form = {
        name: r.name,
        category: r.category,
        price: String(r.price || ''),
        tags: [...(r.tags || [])],
        ingredients: (r.ingredients || []).map(g => ({
          category: g.category,
          items: (g.items || []).map(i => ({ name: i.name, amount: i.amount }))
        })),
        steps: (r.steps || []).map(s => ({ text: s.text || '', img: s.img || null })),
        cover: r.cover || null,
        refLink: r.refLink || '',
        draft: false,
      };
      // Ensure all ING_CATEGORIES exist
      ING_CATEGORIES.forEach(cat => {
        if(!state.form.ingredients.find(g => g.category === cat)){
          state.form.ingredients.push({ category: cat, items: [{ name: '', amount: '' }] });
        }
      });
    }
    document.getElementById('createTitle').textContent = '编辑菜谱';
  } else {
    state.form = defaultForm();
    document.getElementById('createTitle').textContent = '新建菜谱';
  }
  document.getElementById('createPage').classList.add('show');
  document.getElementById('btnBack').classList.add('show');
  document.getElementById('headerTitle').textContent = editId ? '编辑菜谱' : '新建菜谱';
  document.getElementById('btnExport').style.display = 'none';
  renderCreateStep();
}

function confirmCloseCreate(){
  if(hasFormContent()){
    if(!confirm('你有未保存的内容，确定关闭吗？\n（可先点击"暂存草稿"保存）')) return;
  }
  closeCreatePage();
}

function hasFormContent(){
  const f = state.form;
  if(!f) return false;
  return !!(f.name || f.price || f.tags.length > 0 ||
    f.ingredients.some(g => g.items.some(i => i.name)) ||
    f.steps.some(s => s.text) || f.cover || f.refLink);
}

function closeCreatePage(){
  document.getElementById('createPage').classList.remove('show');
  state.form = null;
  state.createStep = 0;
  state.currentView = 'main';
  document.getElementById('btnBack').classList.remove('show');
  document.getElementById('headerTitle').textContent = 'DIY菜谱';
}

function saveDraft(){
  collectFormData();
  state.form.draft = true;
  // Save draft to recipe list
  const recipe = formToRecipe(state.form, state.editingId);
  recipe.draft = true;
  recipe.name = recipe.name || '未命名草稿';
  saveRecipeToState(recipe);
  toast('💾 草稿已暂存');
  closeCreatePage();
  renderAll();
}

function renderCreateStep(){
  renderCreateProgress();
  const body = document.getElementById('createBody');
  const bottomBar = document.getElementById('createBottomBar');
  const f = state.form;
  const s = state.createStep;

  body.innerHTML = '';
  const stepHTML = [
    renderStep1_BasicInfo,
    renderStep2_Ingredients,
    renderStep3_Steps,
    renderStep4_RefLink,
    renderStep5_Cover,
    renderStep6_Save,
  ][s]();

  body.innerHTML = stepHTML;

  // Bottom bar
  const totalSteps = 6;
  let bottomHTML = '';
  if(s < totalSteps - 1){
    bottomHTML = `
      ${s > 0 ? `<button class="btn btn-outline" onclick="prevStep()">← 上一步</button>` : '<div></div>'}
      <button class="btn btn-primary" onclick="nextStep()">下一步 →</button>
    `;
  }
  bottomBar.innerHTML = bottomHTML;

  // Scroll to top
  body.scrollTop = 0;
}

function renderCreateProgress(){
  const labels = ['基本信息','食材清单','烹饪步骤','参考链接','封面图片','确认创建'];
  document.getElementById('createProgress').innerHTML = labels.map((l,i) => {
    let cls = '';
    if(i < state.createStep) cls = 'done';
    else if(i === state.createStep) cls = 'active';
    return `<div style="display:flex;flex-direction:column;align-items:center">
      <div style="display:flex;align-items:center">
        <div class="progress-dot ${cls}">${i < state.createStep ? '✓' : i+1}</div>
        ${i < labels.length-1 ? `<div class="progress-line ${i < state.createStep ? 'done' : ''}"></div>` : ''}
      </div>
      <div class="progress-label ${cls}">${l}</div>
    </div>`;
  }).join('');
}

function nextStep(){
  collectFormData();
  if(state.createStep < 5){
    state.createStep++;
    renderCreateStep();
  }
}

function prevStep(){
  collectFormData();
  if(state.createStep > 0){
    state.createStep--;
    renderCreateStep();
  }
}

function collectFormData(){
  const f = state.form;
  const s = state.createStep;

  if(s === 0){
    f.name = document.getElementById('fName')?.value || '';
    f.price = document.getElementById('fPrice')?.value || '';
    // category is set by chip click
    // tags are managed via addTag/removeTag
  }
  if(s === 1){
    // Ingredients collected via add/update functions
    document.querySelectorAll('.ing-group').forEach(group => {
      const cat = group.dataset.category;
      const items = [];
      group.querySelectorAll('.ing-row').forEach(row => {
        const inputs = row.querySelectorAll('input');
        const name = inputs[0]?.value?.trim() || '';
        const amount = inputs[1]?.value?.trim() || '';
        if(name) items.push({ name, amount });
      });
      const grp = f.ingredients.find(g => g.category === cat);
      if(grp) grp.items = items.length > 0 ? items : [{ name: '', amount: '' }];
    });
  }
  if(s === 2){
    document.querySelectorAll('.step-editor').forEach(editor => {
      const idx = parseInt(editor.dataset.stepIndex);
      const textarea = editor.querySelector('textarea');
      if(textarea && f.steps[idx]) f.steps[idx].text = textarea.value;
    });
  }
  if(s === 3){
    f.refLink = document.getElementById('fRefLink')?.value || '';
  }
}

// ---- STEP 1: Basic Info ----
function renderStep1_BasicInfo(){
  const f = state.form;
  return `
    <h3 style="font-size:15px;margin-bottom:16px;color:var(--text)">📝 菜谱基本信息</h3>
    <div class="form-group">
      <label class="form-label"><span class="required">*</span> 菜谱名称</label>
      <input class="form-input" id="fName" value="${escHtml(f.name)}" placeholder="给你的拿手菜起个响亮的名字">
    </div>
    <div class="form-group">
      <label class="form-label"><span class="required">*</span> 所属分类</label>
      <div class="cat-chip-group">
        ${state.categories.map(c => `<span class="cat-chip ${f.category===c?'selected':''}" onclick="pickCategory('${c}',this)">${CATEGORY_EMOJI[c]||''} ${c}</span>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">菜品定价</label>
      <input class="form-input" id="fPrice" type="number" value="${f.price}" placeholder="输入价格（元），如 38" style="width:140px">
    </div>
    <div class="form-group">
      <label class="form-label">自定义标签 <span class="optional">（方便查找）</span></label>
      <div class="tag-row" id="tagRow">
        ${(f.tags||[]).map((t,i) => `<span class="tag-item">${escHtml(t)}<span class="tag-remove" onclick="removeTag(${i})">×</span></span>`).join('')}
        <input class="tag-input-inline" id="tagInput" placeholder="输入标签" onkeydown="if(event.key==='Enter'){addTag();event.preventDefault()}">
      </div>
    </div>
  `;
}

function pickCategory(cat, el){
  state.form.category = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function addTag(){
  const input = document.getElementById('tagInput');
  const val = input.value.trim();
  if(!val) return;
  if(state.form.tags.includes(val)){ input.value=''; return toast('标签已存在'); }
  state.form.tags.push(val);
  input.value = '';
  renderCreateStep(); // re-render to show new tag
}

function removeTag(i){
  state.form.tags.splice(i,1);
  renderCreateStep();
}

// ---- STEP 2: Ingredients ----
function renderStep2_Ingredients(){
  const f = state.form;
  return `
    <h3 style="font-size:15px;margin-bottom:6px;color:var(--text)">🥘 食材清单</h3>
    <p style="font-size:12px;color:var(--text-light);margin-bottom:16px">按分类填写食材与用量，留空的项目不会被保存</p>
    ${(f.ingredients||[]).map((grp, gi) => `
      <div class="ingredient-block ing-group" data-category="${grp.category}">
        <div class="ing-category-label">▎${grp.category}</div>
        <div class="ing-items-container">
          ${(grp.items||[]).map((item, ii) => `
            <div class="ing-row">
              <input class="form-input" placeholder="食材名称" value="${escHtml(item.name)}" onchange="updateIngredient('${grp.category}',${ii},'name',this.value)">
              <input class="form-input" placeholder="用量（如500g）" value="${escHtml(item.amount)}" onchange="updateIngredient('${grp.category}',${ii},'amount',this.value)">
              <button class="remove-btn" onclick="removeIngredientItem('${grp.category}',${ii})">×</button>
            </div>
          `).join('')}
        </div>
        <button class="add-ing-btn" onclick="addIngredientItem('${grp.category}')">＋ 添加${grp.category}食材</button>
      </div>
    `).join('')}
  `;
}

function updateIngredient(cat, idx, field, value){
  const grp = state.form.ingredients.find(g => g.category === cat);
  if(grp && grp.items[idx]){
    grp.items[idx][field] = value;
  }
}

function addIngredientItem(cat){
  const grp = state.form.ingredients.find(g => g.category === cat);
  if(grp) grp.items.push({ name: '', amount: '' });
  renderCreateStep();
}

function removeIngredientItem(cat, idx){
  const grp = state.form.ingredients.find(g => g.category === cat);
  if(grp && grp.items.length > 1){
    grp.items.splice(idx, 1);
    renderCreateStep();
  } else if(grp){
    grp.items = [{ name: '', amount: '' }];
    renderCreateStep();
  }
}

// ---- STEP 3: Cooking Steps ----
function renderStep3_Steps(){
  const f = state.form;
  return `
    <h3 style="font-size:15px;margin-bottom:6px;color:var(--text)">👨‍🍳 烹饪步骤</h3>
    <p style="font-size:12px;color:var(--text-light);margin-bottom:16px">每个步骤限制500字以内，可配过程图</p>
    ${(f.steps||[]).map((s, i) => `
      <div class="step-editor-card step-editor" data-step-index="${i}">
        <div class="step-header">
          <span class="step-label"><span class="num">${i+1}</span> 步骤 ${i+1}</span>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeStepEditor(${i})">🗑️ 删除</button>
        </div>
        <textarea class="form-input" placeholder="详细描述这一步怎么做…（500字以内）" maxlength="500" oninput="updateStepCharCount(this,${i})">${escHtml(s.text)}</textarea>
        <div class="char-count" id="charCount${i}">${(s.text||'').length}/500</div>
        <div class="step-img-upload ${s.img?'has-img':''}" id="stepImgUpload${i}" onclick="triggerStepImg(${i})">
          ${s.img ? `<img src="${s.img}"><span class="replace-hint">点击替换</span>` : '📷 点击添加步骤图片'}
        </div>
        <input type="file" accept="image/*" style="display:none" id="stepImgFile${i}" onchange="handleStepImg(${i},this)">
      </div>
    `).join('')}
    <button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="addStepEditor()">＋ 添加步骤</button>
  `;
}

function updateStepCharCount(textarea, idx){
  document.getElementById('charCount'+idx).textContent = textarea.value.length + '/500';
  // Also update form
  if(state.form.steps[idx]) state.form.steps[idx].text = textarea.value;
}

function triggerStepImg(idx){
  document.getElementById('stepImgFile'+idx).click();
}

function handleStepImg(idx, input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    if(state.form.steps[idx]) state.form.steps[idx].img = e.target.result;
    renderCreateStep();
  };
  reader.readAsDataURL(file);
}

function addStepEditor(){
  state.form.steps.push({ text: '', img: null });
  renderCreateStep();
}

function removeStepEditor(idx){
  if(state.form.steps.length <= 1){
    state.form.steps = [{ text: '', img: null }];
  } else {
    state.form.steps.splice(idx, 1);
  }
  renderCreateStep();
}

// ---- STEP 4: Reference Link ----
function renderStep4_RefLink(){
  return `
    <h3 style="font-size:15px;margin-bottom:16px;color:var(--text)">🔗 参考链接</h3>
    <div class="form-group">
      <label class="form-label">参考链接 <span class="optional">（非必填）</span></label>
      <input class="form-input" id="fRefLink" value="${escHtml(state.form.refLink)}" placeholder="粘贴参考视频、食谱网页或其他灵感链接">
    </div>
    <p style="font-size:12px;color:var(--text-light);line-height:1.6">💡 记录菜谱的灵感来源，方便以后回顾。可以是B站教程、小红书笔记、下厨房链接等。</p>
  `;
}

// ---- STEP 5: Cover Image ----
function renderStep5_Cover(){
  return `
    <h3 style="font-size:15px;margin-bottom:16px;color:var(--text)">🖼️ 菜品封面图</h3>
    <div class="form-group">
      <label class="form-label">选择封面图片</label>
      <div class="cover-picker-area ${state.form.cover?'has-cover':''}" id="coverPickerArea" onclick="triggerCoverInput()">
        ${state.form.cover
          ? `<img src="${state.form.cover}">`
          : `<span class="cover-picker-icon">📸</span><span class="cover-picker-text">点击上传封面图</span><span class="cover-picker-sub"><span>📷 拍照</span><span>🖼️ 相册选择</span></span>`
        }
      </div>
      <input type="file" accept="image/*" style="display:none" id="coverFileInput" onchange="handleCoverImg(this)">
    </div>
    <div class="permission-dialog">
      <div class="perm-icon">🔐</div>
      <div class="perm-title">需要访问您的相册或相机</div>
      <div class="perm-desc">用于上传菜品封面图片。请在系统弹窗中选择"允许"以继续使用该功能。</div>
      <div class="perm-actions">
        <button class="btn btn-outline btn-sm" onclick="triggerCoverInput()">📷 拍照</button>
        <button class="btn btn-primary btn-sm" onclick="triggerCoverInput()">🖼️ 从相册选择</button>
      </div>
    </div>
  `;
}

function triggerCoverInput(){
  document.getElementById('coverFileInput').click();
}

function handleCoverImg(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    state.form.cover = e.target.result;
    renderCreateStep();
  };
  reader.readAsDataURL(file);
}

// ---- STEP 6: Save / Confirm ----
function renderStep6_Save(){
  const f = state.form;
  const name = f.name || '未命名菜谱';
  const hasIngredients = f.ingredients.some(g => g.items.some(i => i.name));
  const hasSteps = f.steps.some(s => s.text.trim());
  const warnings = [];
  if(!f.name) warnings.push('⚠️ 尚未填写菜谱名称');
  if(!f.price) warnings.push('💡 建议设置菜品定价');
  if(!hasIngredients) warnings.push('💡 建议填写食材清单');
  if(!hasSteps) warnings.push('💡 建议添加烹饪步骤');

  return `
    <div style="text-align:center;padding:10px 0 20px">
      <div style="font-size:64px;margin-bottom:12px">🎉</div>
      <h3 style="margin-bottom:4px">准备就绪！</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:20px">检查无误后即可保存</p>
    </div>

    <div class="summary-card">
      <div class="sum-title">📝 ${escHtml(name)}</div>
      <div class="sum-detail">
        分类：${f.category}<br>
        定价：${f.price ? '¥'+f.price : '未定价'}<br>
        食材：${f.ingredients.reduce((sum,g) => sum + g.items.filter(i=>i.name).length, 0)} 种<br>
        步骤：${f.steps.filter(s=>s.text.trim()).length} 步
        ${f.cover ? '<br>封面：✅ 已上传' : ''}
        ${f.refLink ? '<br>参考链接：✅ 已填写' : ''}
      </div>
    </div>

    ${warnings.length > 0 ? `
      <div class="summary-card" style="background:#FFFBF0">
        <div class="sum-title">📋 提示</div>
        ${warnings.map(w => `<div class="sum-warning">${w}</div>`).join('')}
        <p style="font-size:11px;color:var(--text-light);margin-top:8px">你可以现在补充完整，也可以先保存以后再编辑。</p>
      </div>
    ` : ''}

    <p style="font-size:12px;color:var(--text-light);text-align:center;margin-top:12px">保存后自动存入个人DIY菜谱库，支持后续二次编辑</p>

    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-outline" style="flex:1" onclick="saveDraft()">💾 暂存草稿</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveRecipe()">✅ 创建菜谱</button>
    </div>
  `;
}

// ===================== SAVE RECIPE =====================
function formToRecipe(form, editId){
  return {
    id: editId || Date.now(),
    name: form.name || '未命名菜谱',
    category: form.category || '荤菜',
    price: parseFloat(form.price) || 0,
    tags: form.tags || [],
    ingredients: (form.ingredients || []).map(g => ({
      category: g.category,
      items: (g.items || []).filter(i => i.name)
    })).filter(g => g.items.length > 0),
    steps: (form.steps || []).filter(s => s.text.trim()).map(s => ({ text: s.text, img: s.img })),
    cover: form.cover,
    refLink: form.refLink || '',
    coverEmoji: CATEGORY_EMOJI[form.category] || '🍽️',
    createdAt: editId ? (state.recipes.find(r=>r.id===editId)?.createdAt || new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10),
    draft: form.draft || false,
  };
}

function saveRecipeToState(recipe){
  if(state.editingId){
    const idx = state.recipes.findIndex(r => r.id === state.editingId);
    if(idx >= 0) state.recipes[idx] = recipe;
  } else {
    state.recipes.unshift(recipe);
  }
}

function saveRecipe(){
  collectFormData();
  const recipe = formToRecipe(state.form, state.editingId);
  saveRecipeToState(recipe);
  toast(state.editingId ? '✅ 菜谱已更新！' : '🎉 菜谱创建成功！');
  closeCreatePage();
  renderAll();
}

// ===================== CATEGORY MANAGER =====================
function openCategoryManager(){
  document.getElementById('catManagerContent').innerHTML = `
    <div class="action-sheet-handle"></div>
    <div style="text-align:center;padding:12px;font-size:15px;font-weight:600">⚙️ 分类管理</div>
    <div style="padding:12px 16px">
      <div class="form-group">
        <label class="form-label">新增分类</label>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="newCatInput" placeholder="输入新分类名称">
          <button class="btn btn-primary btn-sm" onclick="addNewCategory()" style="white-space:nowrap">＋ 添加</button>
        </div>
      </div>
      <label class="form-label" style="margin-top:16px">现有分类（长按拖拽排序）</label>
      <div id="sortableList">
        ${state.categories.map((c,i) => `
          <div class="cat-sort-item" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;margin:4px 0;background:var(--bg-gray);border-radius:var(--radius-xs);cursor:grab" draggable="true" data-cat="${c}" data-idx="${i}"
              ondragstart="handleDragStart(event)" ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragend="handleDragEnd(event)">
            <span style="display:flex;align-items:center;gap:8px">
              <span style="color:var(--text-light);font-size:14px">⋮⋮</span>
              <span>${CATEGORY_EMOJI[c]||'📁'} ${c}</span>
            </span>
            <div style="display:flex;gap:4px">
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();renameCategory('${c}')">✏️</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="event.stopPropagation();deleteCategory('${c}')">🗑️</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="action-sheet-cancel" onclick="closeCatManager()">完成</div>
  `;
  document.getElementById('catManagerOverlay').classList.add('show');
}

function closeCatManager(e){
  if(e && e.target !== document.getElementById('catManagerOverlay')) return;
  document.getElementById('catManagerOverlay').classList.remove('show');
  renderAll();
}

function addNewCategory(){
  const input = document.getElementById('newCatInput');
  const name = input.value.trim();
  if(!name) return toast('请输入分类名称');
  if(state.categories.includes(name)) return toast('该分类已存在');
  state.categories.push(name);
  input.value = '';
  openCategoryManager(); // re-render
}

function renameCategory(oldName){
  const newName = prompt('修改分类名称：', oldName);
  if(!newName || !newName.trim() || newName.trim() === oldName) return;
  const trimmed = newName.trim();
  if(state.categories.includes(trimmed)) return toast('该分类已存在');
  const idx = state.categories.indexOf(oldName);
  if(idx >= 0) state.categories[idx] = trimmed;
  // Update recipes
  state.recipes.forEach(r => { if(r.category === oldName) r.category = trimmed; });
  openCategoryManager();
  renderAll();
  toast('分类名称已更新');
}

function deleteCategory(cat){
  if(!confirm(`确定删除「${cat}」分类吗？\n该分类下的菜谱将移至"其他"分类。`)) return;
  state.categories = state.categories.filter(c => c !== cat);
  state.recipes.forEach(r => { if(r.category === cat) r.category = '其他'; });
  if(!state.categories.includes('其他')) state.categories.push('其他');
  if(state.selectedCat === cat) state.selectedCat = null;
  openCategoryManager();
  renderAll();
  toast('分类已删除');
}

// ---- Drag & Drop for Categories ----
let dragSrcCat = null;
function handleDragStart(e){
  dragSrcCat = e.target.closest('.cat-sort-item')?.dataset.cat;
  e.target.closest('.cat-sort-item')?.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.target.closest('.cat-sort-item')?.classList.add('drag-over');
}
function handleDrop(e){
  e.preventDefault();
  const targetEl = e.target.closest('.cat-sort-item');
  targetEl?.classList.remove('drag-over');
  const targetCat = targetEl?.dataset.cat;
  if(!dragSrcCat || !targetCat || dragSrcCat === targetCat) return;
  const srcIdx = state.categories.indexOf(dragSrcCat);
  const tgtIdx = state.categories.indexOf(targetCat);
  if(srcIdx < 0 || tgtIdx < 0) return;
  const [moved] = state.categories.splice(srcIdx, 1);
  state.categories.splice(tgtIdx, 0, moved);
  openCategoryManager();
}
function handleDragEnd(e){
  e.target.closest('.cat-sort-item')?.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragSrcCat = null;
}

// ===================== NAVIGATION =====================
function goBack(){
  if(state.currentView === 'detail'){
    document.getElementById('subPageDetail').classList.remove('show');
    state.currentView = 'main';
    state.currentDetailId = null;
    document.getElementById('btnBack').classList.remove('show');
    document.getElementById('btnExport').style.display = 'none';
    document.getElementById('headerTitle').textContent = 'DIY菜谱';
  } else if(state.currentView === 'create'){
    confirmCloseCreate();
  }
}

// ===================== TOAST =====================
let toastTimer;
function toast(msg){
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ===================== UTILS =====================
function escHtml(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
