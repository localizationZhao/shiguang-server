<?xml version="1.0" encoding="UTF-8"?>
<!-- sound1.svg - 音量图标第1档（最小音量） -->
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 麦克风主体 -->
  <ellipse cx="50" cy="30" rx="20" ry="25" fill="#07C160" stroke="#07C160" stroke-width="2"/>
  <!-- 麦克风支架 -->
  <line x1="50" y1="55" x2="50" y2="75" stroke="#07C160" stroke-width="4"/>
  <!-- 麦克风底座 -->
  <path d="M30 75 Q50 85 70 75" fill="none" stroke="#07C160" stroke-width="3"/>
  <!-- 音量指示条（第1档，1条） -->
  <rect x="85" y="20" width="5" height="10" fill="#07C160" rx="1"/>
</svg>