<?xml version="1.0" encoding="UTF-8"?>
<!-- sound5.svg - 音量图标第5档（最大音量） -->
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 麦克风主体 -->
  <ellipse cx="50" cy="30" rx="20" ry="25" fill="#FF5722" stroke="#FF5722" stroke-width="2"/>
  <!-- 麦克风支架 -->
  <line x1="50" y1="55" x2="50" y2="75" stroke="#FF5722" stroke-width="4"/>
  <!-- 麦克风底座 -->
  <path d="M30 75 Q50 85 70 75" fill="none" stroke="#FF5722" stroke-width="3"/>
  <!-- 音量指示条（第5档，5条，最大音量显示红色） -->
  <rect x="85" y="10" width="5" height="6" fill="#FF5722" rx="1"/>
  <rect x="85" y="22" width="5" height="10" fill="#FF5722" rx="1"/>
  <rect x="85" y="37" width="5" height="14" fill="#FF5722" rx="1"/>
  <rect x="85" y="56" width="5" height="18" fill="#FF5722" rx="1"/>
  <rect x="85" y="78" width="5" height="20" fill="#FF5722" rx="1"/>
</svg>